name: iOS Build (Unsigned IPA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          DERIVED="$RUNNER_TEMP/DerivedData"
          xcodebuild \
            -workspace ios/gesturemouse.xcworkspace \
            -scheme gesturemouse \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "$DERIVED" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            NODE_BINARY="$(which node)" \
            REACT_NATIVE_PATH="$(node --print "require.resolve('react-native/package.json').replace('/package.json','')")" \
            build 2>&1 | tee /tmp/xcodebuild.log; \
          BUILD_STATUS=${PIPESTATUS[0]}; \
          if [ $BUILD_STATUS -ne 0 ]; then \
            echo ""; \
            echo "========== ❌ BUILD ERRORS =========="; \
            grep -E "error:" /tmp/xcodebuild.log | grep -v "^note:" | head -80; \
            echo "** BUILD FAILED **"; \
            echo "====================================="; \
            exit $BUILD_STATUS; \
          fi
          echo "✅ Build succeeded"

      - name: Package .app → .ipa
        run: |
          DERIVED="$RUNNER_TEMP/DerivedData"
          APP=$(find "$DERIVED" -name "gesturemouse.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found .app: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr "gesture-mouse.ipa" Payload/
          echo "✅ IPA: $(du -sh gesture-mouse.ipa | cut -f1)"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gesture-mouse-ipa
          path: ${{ runner.temp }}/gesture-mouse.ipa
          retention-days: 14
